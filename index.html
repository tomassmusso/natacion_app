<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Natación Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sideMenu" class="side-menu">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h3 style="margin: 0;">Configuración</h3>
    <button class="btn-cerrar-menu" onclick="toggleMenu()">✖</button>
</div>
    
    <button onclick="configurarEstilos()">⚙️ Editar Estilos</button>
    <button onclick="toggleDarkMode()">🌓 Modo Oscuro</button>
    <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 10px 0;">
    <button onclick="exportarDatos()" style="background: #6c757d;">📤 Exportar Backup</button>
    <button onclick="importarDatos()" style="background: #6c757d;">📥 Importar Backup</button>
</div>

    <header class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h1 class="titulo-app">Natación Tracker</h1>
        <div style="width: 44px;"></div> </header>

    <main id="dashboard" class="contenido">
        <section class="cuadro-dashboard">
            <h2>Sesiones</h2>
            <div id="lista-sesiones">
                </div>
        </section>

        <section class="cuadro-dashboard">
            <h2>Estadísticas</h2>
            <div id="resumen-stats">
                </div>
        </section>
    </main>

    <div id="vista-secundaria" class="vista-secundaria hidden">
        <div class="header-secundario">
        
        </div>
        <div id="contenido-secundario" class="contenido"></div>
    </div>

    <button class="fab" onclick="mostrarSeccion('crear')">＋</button>

    <nav class="bottom-nav">
        <button class="nav-rect" onclick="mostrarHorarios()">🕒 HORARIOS</button>
        <button class="nav-rect" onclick="mostrarQR()">🆔 QR ACCESO</button>
    </nav>

    <script src="app.js"></script>
</body>

</html>
